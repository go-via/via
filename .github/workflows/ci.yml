name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    # NOTE: this job always RUNS and reports, even for docs-only changes — only
    # its heavy steps are skipped (see the "Detect" step). Keeping the job (and
    # its "Build and Test" name) unconditional is deliberate: it is a required
    # status check, and a `paths`/`paths-ignore` trigger filter would make the
    # workflow not run on a docs-only PR, leaving the required check pending
    # forever and blocking the merge.
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history to diff against the base for the docs-only check

      - name: Detect code (non-docs) changes
        id: changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          [ -n "$base" ] || base="${{ github.event.before }}"
          zero="0000000000000000000000000000000000000000"
          # Unknown/zero/unreachable base (first push, force-push, new branch) →
          # run the full pipeline (fail safe; never skip CI on uncertainty).
          if [ -z "$base" ] || [ "$base" = "$zero" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            # Changed files that are NOT markdown / not under docs/. A non-empty
            # check (not `grep -q`'s exit code) stays correct across grep
            # implementations; `|| true` guards the no-match exit.
            nondoc="$(git diff --name-only "$base" "${{ github.sha }}" | grep -vE '(\.md$|^docs/)' || true)"
            if [ -n "$nondoc" ]; then
              echo "code=true" >> "$GITHUB_OUTPUT"
            else
              echo "code=false" >> "$GITHUB_OUTPUT"
              echo "Only markdown/docs changed — skipping the Go CI pipeline."
            fi
          fi

      - name: Setup Go
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # the module's floor is the single source of truth
          cache: true

      - name: Run CI checks
        if: steps.changes.outputs.code == 'true'
        run: bash ./ci.sh

      - name: govulncheck
        if: steps.changes.outputs.code == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
          (cd vtbrowser && govulncheck -tags browser ./...)

  browser-test:
    name: Browser Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: vtbrowser/go.sum

      - name: Install Chromium
        # ubuntu-latest runners ship Google Chrome preinstalled; install
        # Chromium only when no browser is present so the job stays fast
        # on hosted runners but still works on bare self-hosted ones.
        run: |
          if ! command -v google-chrome >/dev/null 2>&1 \
            && ! command -v chromium >/dev/null 2>&1 \
            && ! command -v chromium-browser >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser
          fi
          # Fail loudly here rather than letting the tier skip or flake later.
          command -v google-chrome || command -v chromium || command -v chromium-browser

      - name: Run browser tier (vtbrowser, -tags browser)
        run: cd vtbrowser && go test -race -tags browser ./...
