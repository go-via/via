# Sticky-by-cookie load balancer for the cluster. One entry point on :3000
# fronts all three pods; HAProxy inserts a VIA_LB cookie that pins each browser
# to the pod it first landed on, so that browser's SSE stream and action POSTs
# always reach the same pod (its tab context is in-memory there). The SHARED
# room state still converges across pods via the backplane — stickiness is only
# about per-tab transport affinity, not state.
global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    # SSE streams are long-lived; keep client/server/tunnel timeouts generous so
    # the load balancer doesn't sever an idle-but-open event stream.
    timeout client 1h
    timeout server 1h
    timeout tunnel 1h

# Resolve the app* service names via Docker's embedded DNS at runtime, so the
# LB tolerates a pod that isn't registered in DNS the instant HAProxy boots.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend in
    bind *:3000
    default_backend pods

backend pods
    balance roundrobin
    # insert: add our own cookie; indirect: hide it from the app; nocache: don't
    # let a proxy cache the Set-Cookie. New clients are spread round-robin, then
    # pinned by the cookie on every subsequent request.
    cookie VIA_LB insert indirect nocache
    # Probe /healthz (a DB-ping readiness check), not /, so a pod with a dead
    # Postgres link is taken out of rotation rather than serving broken requests.
    option httpchk GET /healthz
    # init-addr last,libc,none: start even if a backend can't be resolved yet.
    server app1 app1:3000 check resolvers docker init-addr last,libc,none cookie one
    server app2 app2:3000 check resolvers docker init-addr last,libc,none cookie two
    server app3 app3:3000 check resolvers docker init-addr last,libc,none cookie three
